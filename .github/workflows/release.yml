name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-linux-musl
            archive: gtlogj-linux-x86_64.tar.gz
          - os: windows-latest
            target: x86_64-windows
            archive: gtlogj-windows-x86_64.zip
          - os: macos-latest
            target: x86_64-macos
            archive: gtlogj-macos-x86_64.tar.gz
          - os: macos-latest
            target: aarch64-macos
            archive: gtlogj-macos-aarch64.tar.gz

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: mlugg/setup-zig@v2
        with:
          version: '0.15.0'

      - name: Build
        run: zig build -Doptimize=ReleaseSmall -Dtarget=${{ matrix.target }} --summary all

      - name: Package (Unix — tar.gz)
        if: runner.os != 'Windows'
        run: |
          tar -czf ${{ matrix.archive }} -C zig-out/bin gtlogj

      - name: Package (Windows — zip)
        if: runner.os == 'Windows'
        run: |
          Compress-Archive -Path zig-out\bin\gtlogj.exe -DestinationPath ${{ matrix.archive }}

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.archive }}
