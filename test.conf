[folders]
; path is ommited for this test config so it is easier to use to try examples from readme
; paths = /path/to/logs
timestamp = ts
level = level
message = message
output = [{level:6}] {timestamp} {message}

[profile.timed]
output = {timestamp:datetime} [{level}]: {message}

[profile.custom]
output = {timestamp} |{custom_field}|{missing_field}|: {message}


[profile.time]
output = {timestamp:time} [{level:6}]: {message}

[profile.timems]
output = {timestamp:timems} [{level}]: {message}
