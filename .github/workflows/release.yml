name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - name: Install JS dependencies
        run: bun install

      - name: Build demo (produces zig-out/web/*)
        run: bun run build-demo

      - name: Upload web assets
        uses: actions/upload-artifact@v4
        with:
          name: web-assets
          path: zig-out/web/
          retention-days: 1

  build:
    needs: build-web
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-linux-musl
            archive: gtlogj-linux-x86_64.tar.gz
          - os: windows-latest
            target: x86_64-windows
            archive: gtlogj-windows-x86_64.zip
          - os: macos-latest
            target: x86_64-macos
            archive: gtlogj-macos-x86_64.tar.gz
          - os: macos-latest
            target: aarch64-macos
            archive: gtlogj-macos-aarch64.tar.gz

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Download web assets
        uses: actions/download-artifact@v4
        with:
          name: web-assets
          path: zig-out/web/

      - uses: mlugg/setup-zig@v2
        with:
          version: '0.15.0'

      - name: Build
        run: zig build -Doptimize=ReleaseSafe -Dtarget=${{ matrix.target }} --summary all

      - name: Package (Unix — tar.gz)
        if: runner.os != 'Windows'
        run: |
          tar -czf ${{ matrix.archive }} -C zig-out/bin gtlogj

      - name: Package (Windows — zip)
        if: runner.os == 'Windows'
        run: |
          Compress-Archive -Path zig-out\bin\gtlogj.exe -DestinationPath ${{ matrix.archive }}

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.archive }}
